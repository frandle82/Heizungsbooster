substitutions:
  # -----------------------
  # Geräte-Identifikation
  # -----------------------
  device_name: heizungsbooster
  device_friendly_name: Heizungsbooster

  # -----------------------
  # Sicherheit & Netzwerk
  # -----------------------
  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password
  ap_ssid: ${device_name}_AP
  ap_password: !secret ap_password

  # -----------------------
  # Lüfter Konfiguration
  # -----------------------
  pin_fan: GPIO04
  fan_pwm_frequency: 25000 Hz

  # ---------------------------------
  # Home Assistant Entitäten
  # ---------------------------------
  climate_entity: "climate.wohnzimmer"
  heizung1_temp_entity: "climate.wohnzimmer_heizung_links"
  heizung2_temp_entity: "climate.wohnzimmer_heizung_rechts"
  raum_temp_entity: "sensor.wohnzimmer_luftqualitat_temperatur"

  # -----------------------
  # Initialwerte
  # -----------------------
  initial_man_fan_speed: "50.0"
  initial_auto_speed_limit: "100.0"
  initial_auto_min_fan_speed: "20.0"
  initial_radiator_on_threshold: "3.0"
  initial_radiator_off_threshold: "1.8"
  initial_after_run_minutes: "6.0"
  initial_need_on_threshold: "0.20"
  initial_need_off_threshold: "-0.10"

  # -----------------------
  # Timing
  # -----------------------
  automatik_interval: 6s
  sensor_update_interval: 5s

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

logger:

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}

captive_portal:

web_server:
  port: 80
  include_internal: false
  log: false

globals:
  - id: last_speed
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_heat_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: target_smooth
    type: float
    restore_value: no
    initial_value: '0'

  - id: heat_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: after_run_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: failsafe_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: effective_room_temp_value
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: effective_target_temp_value
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: effective_radiator_delta_value
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: effective_need_delta_value
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: effective_target_speed_value
    type: float
    restore_value: no
    initial_value: '0'

  - id: room_source_label
    type: std::string
    restore_value: no
    initial_value: '"none"'

switch:
  - platform: restart
    name: Neustart
    id: reboot

fan:
  - platform: speed
    output: pwm_output
    name: "Ventilator"
    id: heizung_luefter
    speed_count: 100
    restore_mode: ALWAYS_OFF

output:
  - platform: ledc
    frequency: ${fan_pwm_frequency}
    pin: ${pin_fan}
    id: pwm_output

interval:
  - interval: ${automatik_interval}
    then:
      - script.execute: automatik_steuerung

text_sensor:
  - platform: template
    name: "Heizungsbooster Status"
    id: booster_status

binary_sensor:
  - platform: homeassistant
    name: "Fenster Status"
    entity_id: ${climate_entity}
    attribute: window_open
    id: fenster_status
    on_state:
      - script.execute: automatik_steuerung

sensor:
  - platform: dht
    pin: GPIO27
    temperature:
      name: "Heizung Konvektions-Proxy"
      id: heizung_surface
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        - lambda: |-
            if (x < 15.0 || x > 80.0) return NAN;
            return x;
    update_interval: 60s

  - platform: homeassistant
    name: "Heizkörper1 Temperatur"
    entity_id: ${heizung1_temp_entity}
    attribute: current_temperature
    internal: true
    id: heizung1_temp

  - platform: homeassistant
    name: "Heizkörper2 Temperatur"
    entity_id: ${heizung2_temp_entity}
    attribute: current_temperature
    internal: true
    id: heizung2_temp

  - platform: homeassistant
    name: "Solltemperatur"
    entity_id: ${climate_entity}
    attribute: temperature
    internal: true
    id: climate_target_temp

  - platform: homeassistant
    name: "Raumtemperatur Climate"
    entity_id: ${climate_entity}
    attribute: current_temperature
    internal: true
    id: climate_room_temp

  - platform: homeassistant
    name: "Raumtemperatur Sensor"
    entity_id: ${raum_temp_entity}
    internal: true
    id: raum_temp_sensor

  - platform: template
    name: "Heizungstemperatur"
    id: heizung_temp
    update_interval: ${sensor_update_interval}
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    lambda: |-
      float h1 = id(heizung1_temp).state;
      float h2 = id(heizung2_temp).state;
      if (isnan(h1)) return h2;
      if (isnan(h2)) return h1;
      return (h1 > h2) ? h1 : h2;

number:
  - platform: template
    name: "man Lueftergeschwindigkeit"
    id: man_fan_speed
    min_value: 0.0
    max_value: 100.0
    step: 10.0
    initial_value: ${initial_man_fan_speed}
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          if (id(fan_mode).current_option() == "manual") {
            id(apply_man_fan_speed).execute();
          } else if (id(fan_mode).current_option() == "auto") {
            id(automatik_steuerung).execute();
          }

  - platform: template
    name: "auto Speed Limit"
    id: auto_speed_limit
    min_value: 0.0
    max_value: 100.0
    step: 1.0
    initial_value: ${initial_auto_speed_limit}
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "Auto Minimum Fan Speed"
    id: auto_min_fan_speed
    min_value: 0.0
    max_value: 50.0
    step: 1.0
    mode: slider
    initial_value: ${initial_auto_min_fan_speed}
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "Radiator On Threshold"
    id: radiator_on_threshold
    min_value: 1.0
    max_value: 8.0
    step: 0.1
    mode: box
    initial_value: ${initial_radiator_on_threshold}
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "Radiator Off Threshold"
    id: radiator_off_threshold
    min_value: 0.5
    max_value: 6.0
    step: 0.1
    mode: box
    initial_value: ${initial_radiator_off_threshold}
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "Need On Threshold"
    id: need_on_threshold
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    mode: box
    initial_value: ${initial_need_on_threshold}
    optimistic: true
    restore_value: true
    unit_of_measurement: "K"
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "Need Off Threshold"
    id: need_off_threshold
    min_value: -1.0
    max_value: 0.5
    step: 0.05
    mode: box
    initial_value: ${initial_need_off_threshold}
    optimistic: true
    restore_value: true
    unit_of_measurement: "K"
    on_value:
      - script.execute: automatik_steuerung

  - platform: template
    name: "After Run Duration"
    id: after_run_minutes
    min_value: 1.0
    max_value: 20.0
    step: 1.0
    mode: box
    initial_value: ${initial_after_run_minutes}
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"
    on_value:
      - script.execute: automatik_steuerung

select:
  - platform: template
    id: fan_mode
    name: "Betriebsmodus"
    options:
      - "off"
      - "manual"
      - "auto"
    initial_option: "auto"
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          std::string mode = id(fan_mode).current_option();
          if (mode == "off") {
            id(last_speed) = 0;
            id(target_smooth) = 0.0f;
            id(heat_active) = false;
            id(after_run_active) = false;
            id(failsafe_active) = false;
            id(heizung_luefter).turn_off().perform();
            id(booster_status).publish_state("OFF | manual off");
          } else if (mode == "manual") {
            id(apply_man_fan_speed).execute();
          } else {
            id(automatik_steuerung).execute();
          }

script:
  - id: apply_man_fan_speed
    then:
      - lambda: |-
          if (id(fan_mode).current_option() != "manual") return;
          const int speed_value = (int) id(man_fan_speed).state;
          if (speed_value < 1) {
            id(heizung_luefter).turn_off().perform();
          } else {
            auto call = id(heizung_luefter).turn_on();
            call.set_speed(speed_value);
            call.perform();
          }

  - id: switch_mode
    then:
      - lambda: |-
          std::string current_mode = id(fan_mode).current_option();
          std::string new_mode;
          if (current_mode == "off") new_mode = "manual";
          else if (current_mode == "manual") new_mode = "auto";
          else new_mode = "off";
          id(fan_mode).publish_state(new_mode);

  - id: adjust_manual_speed
    then:
      - lambda: |-
          if (id(fan_mode).current_option() != "manual") return;
          float current_speed = id(man_fan_speed).state;
          float new_speed;
          if (current_speed < 12.5f) new_speed = 25.0f;
          else if (current_speed < 37.5f) new_speed = 50.0f;
          else if (current_speed < 62.5f) new_speed = 75.0f;
          else if (current_speed < 87.5f) new_speed = 100.0f;
          else new_speed = 0.0f;
          id(man_fan_speed).publish_state(new_speed);

  - id: automatik_steuerung
    then:
      - lambda: |-
          if (id(fan_mode).current_option() != "auto") return;

          id(failsafe_active) = false;
          id(after_run_active) = false;

          // 1) Fenster offen -> aus
          const bool window_open = id(fenster_status).has_state() && id(fenster_status).state;
          if (window_open) {
            id(heat_active) = false;
            id(target_smooth) = 0.0f;
            id(last_speed) = 0;
            id(heizung_luefter).turn_off().perform();
            id(booster_status).publish_state("WINDOW | fan off");
            return;
          }

          // 2) Eingangswerte ermitteln (Raumtemp: Sensor bevorzugt, sonst Climate-Attribut)
          const bool has_target = id(climate_target_temp).has_state() && isfinite(id(climate_target_temp).state);
          const bool has_radiator = id(heizung_temp).has_state() && isfinite(id(heizung_temp).state);

          float room_temp = NAN;
          if (id(raum_temp_sensor).has_state() && isfinite(id(raum_temp_sensor).state)) {
            room_temp = id(raum_temp_sensor).state;
            id(room_source_label) = "sensor";
          } else if (id(climate_room_temp).has_state() && isfinite(id(climate_room_temp).state)) {
            room_temp = id(climate_room_temp).state;
            id(room_source_label) = "climate";
          } else {
            id(room_source_label) = "none";
          }

          if (!has_target || !has_radiator || !isfinite(room_temp)) {
            id(failsafe_active) = true;
            id(heat_active) = false;
            id(target_smooth) = 0.0f;
            id(last_speed) = 0;
            id(heizung_luefter).turn_off().perform();
            id(booster_status).publish_state("FAILSAFE | missing sensor value");
            return;
          }

          const float target_temp = id(climate_target_temp).state;
          const float radiator_temp = id(heizung_temp).state;
          const float radiator_delta = radiator_temp - room_temp;
          const float need_delta = target_temp - room_temp;

          id(effective_room_temp_value) = room_temp;
          id(effective_target_temp_value) = target_temp;
          id(effective_radiator_delta_value) = radiator_delta;
          id(effective_need_delta_value) = need_delta;

          // 3) Heat availability: reale Heizkörperwärme + Heizbedarf
          const float rad_on = id(radiator_on_threshold).state;
          const float rad_off = id(radiator_off_threshold).state;
          const float need_on = id(need_on_threshold).state;
          const float need_off = id(need_off_threshold).state;

          const bool heat_on_condition = (radiator_delta >= rad_on) && (need_delta >= need_on);
          const bool heat_off_condition = (radiator_delta <= rad_off) || (need_delta <= need_off);

          if (heat_on_condition) {
            id(heat_active) = true;
          } else if (heat_off_condition) {
            id(heat_active) = false;
          }

          const uint32_t now = millis();
          if (id(heat_active)) id(last_heat_ms) = now;

          // 4) Nachlauf nur kurz und nur bei noch vorhandener Restwärme
          const uint32_t after_run_ms = (uint32_t) roundf(id(after_run_minutes).state * 60000.0f);
          const bool recently_heating = (id(last_heat_ms) > 0) && ((now - id(last_heat_ms)) < after_run_ms);
          const bool after_run = !id(heat_active)
            && recently_heating
            && (radiator_delta > rad_off)
            && (need_delta > -0.4f);
          id(after_run_active) = after_run;

          // 5) Zielgeschwindigkeit aus realer Heizkörperwärme + kleinem Bedarf-Boost
          const float min_auto_speed = id(auto_min_fan_speed).state;
          float target_speed = 0.0f;
          if (id(heat_active)) {
            float base_speed = min_auto_speed;
            if (radiator_delta >= rad_on + 5.0f) base_speed = std::max(base_speed, 75.0f);
            else if (radiator_delta >= rad_on + 3.0f) base_speed = std::max(base_speed, 58.0f);
            else if (radiator_delta >= rad_on + 1.0f) base_speed = std::max(base_speed, 42.0f);

            if (need_delta >= 2.0f) base_speed += 18.0f;
            else if (need_delta >= 1.2f) base_speed += 10.0f;
            else if (need_delta >= 0.6f) base_speed += 5.0f;

            target_speed = std::clamp(base_speed, min_auto_speed, 100.0f);
          } else if (after_run) {
            target_speed = std::max(min_auto_speed, 25.0f);
          }

          target_speed = std::min(target_speed, id(auto_speed_limit).state);
          id(target_smooth) = (id(target_smooth) * 0.70f) + (target_speed * 0.30f);
          id(effective_target_speed_value) = id(target_smooth);

          int speed = 0;
          if (id(heat_active) || after_run) {
            const float limited = std::clamp(id(target_smooth), (float) id(last_speed) - 8.0f, (float) id(last_speed) + 8.0f);
            speed = (int) roundf(limited);
            if (speed > 0 && speed < min_auto_speed) speed = (int) roundf(min_auto_speed);
          }

          if (speed <= 0) {
            if (id(last_speed) > 0) id(heizung_luefter).turn_off().perform();
          } else if (speed != id(last_speed)) {
            auto call = id(heizung_luefter).turn_on();
            call.set_speed(speed);
            call.perform();
          }
          id(last_speed) = speed;

          const char *mode_label = id(failsafe_active) ? "FAILSAFE" : (id(heat_active) ? "ACTIVE" : (after_run ? "AFTER_RUN" : "OFF"));
          char status[240];
          snprintf(
            status,
            sizeof(status),
            "%s | room=%s | fan=%d%% | dRad=%.1fK | dNeed=%.1fK | target=%.0f%%",
            mode_label,
            id(room_source_label).c_str(),
            speed,
            radiator_delta,
            need_delta,
            target_speed
          );
          id(booster_status).publish_state(status);

          ESP_LOGD(
            "booster",
            "mode=%s room_src=%s room=%.2f target=%.2f rad=%.2f dRad=%.2f dNeed=%.2f heat=%d after=%d target=%.1f smooth=%.1f speed=%d",
            mode_label,
            id(room_source_label).c_str(),
            room_temp,
            target_temp,
            radiator_temp,
            radiator_delta,
            need_delta,
            id(heat_active),
            after_run,
            target_speed,
            id(target_smooth),
            speed
          );
