substitutions:
  # -----------------------
  # Geräte-Identifikation
  # -----------------------
  device_name: heizungsbooster                   # Name des Geräts (z.B. "heizungsbooster")
  device_friendly_name: Heizungsbooster          # Anzeige-Name des Geräts (z.B. "Heizungsbooster")  

  # -----------------------
  # Sicherheit & Netzwerk
  # -----------------------
  api_encryption_key: !secret api_encryption_key # API Encryption Key (z.B. "base64_encrypted_key_hier_eintragen==")
  ota_password: !secret ota_password             # Passwort für den OTA Update (z.B. "InM2TlqVfJe4")
  ap_ssid: ${device_name}_AP                     # SSID für den Access Point (z.B. "shys-heizungsbooster_AP")
  ap_password: !secret ap_password               # Passwort für den Access Point (z.B. "InM2TlqVfJe4")

  # -----------------------
  # Lüfter Konfiguration
  # -----------------------
  pin_fan: GPIO04                                # Pin für Lüfter PWM Steuersignal
  fan_pwm_frequency: 25000 Hz                    # 4-Pol PC-Lüfter: 25000Hz // 3-Pol Lüfter mit Mosfet Schaltung: 1000Hz (bei Problemen 500-3000Hz testen)

  # ---------------------------------
  # Temperatur-Sensor Konfiguration
  # ---------------------------------
  heizung1_temp_entity: "climate.wohnzimmer_heizung_links"
  heizung2_temp_entity: "climate.wohnzimmer_heizung_rechts"
  steuerung_temp_entity: "climate.wohnzimmer"
  raum_temp_entity: "sensor.wohnzimmer_luftqualitat_temperatur"

  # -----------------------
  # Standardwerte (Initial Values)
  # -----------------------
  initial_man_fan_speed: "50.0"                       # Manuelle Lüftergeschwindigkeit (für MANUAL-Modus)
  initial_auto_curve_offset: "0.0"                    # Additiver Offset für AUTO-Lüfterkurve in Prozentpunkten

  # -----------------------
  # Timing
  # -----------------------
  automatik_interval: 6s        # Intervall für die automatische Steuerung (z.B. 10s)
  sensor_update_interval: 5s    # Sollte etwas kürzer sein als automatik_interval

  # --------------------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------------------
  # Konfiguration ENDE
  # --------------------------------------------------------------------------------------------
  # --------------------------------------------------------------------------------------------

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

logger:

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome
    password: ${ota_password}
  
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: ${ap_ssid}
    password: ${ap_password}

captive_portal:

web_server:
  port: 80
  include_internal: false
  log: false

globals:
  - id: last_speed
    type: int
    restore_value: no
    initial_value: '0'

  - id: last_heat_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: target_smooth
    type: float
    restore_value: no
    initial_value: '0'

  - id: heizbetrieb_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_room_temp
    type: float
    restore_value: no
    initial_value: 'NAN'

  - id: last_room_temp_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: room_temp_slope
    type: float
    restore_value: no
    initial_value: '0'

switch:
  - platform: restart
    name: Neustart
    id: reboot

fan:
  - platform: speed
    output: pwm_output
    name: "Ventilator"
    id: heizung_luefter
    speed_count: 100
    restore_mode: ALWAYS_OFF

output:
  - platform: ledc
    frequency: ${fan_pwm_frequency}
    pin: ${pin_fan}
    id: pwm_output

interval:
  # Automatik-Steuerung
  - interval: ${automatik_interval}
    then:
      - script.execute: automatik_steuerung

text_sensor:
  - platform: template
    name: "Heizungsbooster Status"
    id: booster_status

binary_sensor:
  - platform: homeassistant
    name: "Fenster Status"
    entity_id: ${steuerung_temp_entity}
    attribute: window_open
    id: fenster_status
    on_state:
      - script.execute: automatik_steuerung

sensor:
  - platform: dht
    pin: GPIO27
    temperature:
      name: "Heizung Konvektions-Proxy"
      id: heizung_surface
      filters:
        # DHT ist träge & verrauscht → starkes Glätten
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        # unrealistische Werte blockieren
        - lambda: |-
            if (x < 15.0 || x > 80.0) return NAN;
            return x;
    update_interval: 60s
    
  # Temperatur-Sensor Heizung1
  - platform: homeassistant
    name: "Heizkörper1 Temperatur"
    entity_id: ${heizung1_temp_entity}
    attribute: current_temperature
    internal: true
    id: heizung1_temp

  # Temperatur-Sensor Heizung2
  - platform: homeassistant
    name: "Heizkörper2 Temperatur"
    entity_id: ${heizung2_temp_entity}
    attribute: current_temperature
    internal: true
    id: heizung2_temp

  # eingestellte Raumtemperatur
  - platform: homeassistant
    name: "Solltemperatur"
    entity_id: ${steuerung_temp_entity}
    attribute: temperature
    id: steuerung_temp

  # Raumtemperatur-Sensor aus HA
  - platform: homeassistant
    name: "Raumtemperatur"
    entity_id: ${raum_temp_entity}
    id: raum_temp

  - platform: template
    name: "Heizungstemperatur"
    id: heizung_temp
    update_interval: ${sensor_update_interval}
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    lambda: |-
      float h1 = id(heizung1_temp).state;
      float h2 = id(heizung2_temp).state;
      if (isnan(h1)) return h2;
      if (isnan(h2)) return h1;
      return (h1 > h2) ? h1 : h2;

number:
  # Manuelle Lüftergeschwindigkeit (für MANUAL-Modus)
  - platform: template
    name: "man Lueftergeschwindigkeit"
    id: man_fan_speed
    min_value: 0.0
    max_value: 100.0
    step: 10.0
    initial_value: ${initial_man_fan_speed}
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          std::string mode = id(fan_mode).current_option();
          if (mode == "manual") {
            // MANUAL: Auf manuelle Geschwindigkeit setzen
            id(apply_man_fan_speed).execute();

          } else if (mode == "auto") {
            // AUTO: Automatik-Logik ausführen
            id(automatik_steuerung).execute();
          }

  - platform: template
    name: "auto Speed Limit"
    id: auto_speed_limit
    min_value: 0.0
    max_value: 100.0
    step: 1.0
    initial_value: 100.0
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

  # Additiver Offset für die AUTO-Lüfterkurve (negativ = leiser, positiv = stärker)
  - platform: template
    name: "auto Kurven Offset"
    id: auto_curve_offset
    min_value: -20.0
    max_value: 20.0
    step: 1.0
    mode: slider
    initial_value: ${initial_auto_curve_offset}
    optimistic: true
    restore_value: true
    on_value:
      - script.execute: automatik_steuerung

select:
  # Interner Select für Betriebsmodus
  - platform: template
    id: fan_mode
    name: "Betriebsmodus"
    internal: false
    options:
      - "off"
      - "manual"
      - "auto"
    initial_option: "auto"
    optimistic: true
    restore_value: true
    on_value:
      - lambda: |-
          std::string mode = id(fan_mode).current_option();

          if (mode == "off") {
            // OFF: Lüfter ausschalten
            auto call = id(heizung_luefter).turn_off();
            call.perform();

          } else if (mode == "manual") {
            // MANUAL: Auf manuelle Geschwindigkeit setzen
            id(apply_man_fan_speed).execute();

          } else if (mode == "auto") {
            // AUTO: Automatik-Logik ausführen
            id(automatik_steuerung).execute();
          }

script:
  # Lüftergeschwindigkeit vom Number in den Fan übernehmen (nur im MANUAL-Modus)
  - id: apply_man_fan_speed
    then:
      - lambda: |-
          std::string mode = id(fan_mode).current_option();
          if (mode != "manual") return;

          int speed_value = (int)id(man_fan_speed).state;

          if (speed_value < 1) {
            id(heizung_luefter).turn_off().perform();
          } else {
            auto call = id(heizung_luefter).turn_on();
            call.set_speed(speed_value);
            call.perform();
          }

  # Betriebsmodus wechseln: off -> manual -> auto -> off
  - id: switch_mode
    then:
      - lambda: |-
          std::string current_mode = id(fan_mode).current_option();
          std::string new_mode;

          if (current_mode == "off") new_mode = "manual";
          else if (current_mode == "manual") new_mode = "auto";
          else new_mode = "off";

          id(fan_mode).publish_state(new_mode);

  # Manuelle Geschwindigkeit in 25% Stufen ändern
  - id: adjust_manual_speed
    then:
      - lambda: |-
          std::string mode = id(fan_mode).current_option();
          if (mode != "manual") return;

          float current_speed = id(man_fan_speed).state;
          float new_speed;

          if (current_speed < 12.5) new_speed = 25.0;
          else if (current_speed < 37.5) new_speed = 50.0;
          else if (current_speed < 62.5) new_speed = 75.0;
          else if (current_speed < 87.5) new_speed = 100.0;
          else new_speed = 0.0;

          id(man_fan_speed).publish_state(new_speed);

  # Automatik-Steuerung
  - id: automatik_steuerung
    then:
      - lambda: |-
          if (id(fan_mode).current_option() != "auto") return;

          if (id(fenster_status).state) {
            id(heizung_luefter).turn_off().perform();
            id(last_speed) = 0;
            id(target_smooth) = 0.0f;
            return;
          }
          if (!id(raum_temp).has_state() || !id(heizung_temp).has_state() || !id(steuerung_temp).has_state()) {
            // Fail-safe: ohne valide Messwerte nicht weiterlaufen
            if (id(last_speed) > 0) id(heizung_luefter).turn_off().perform();
            id(last_speed) = 0;
            id(target_smooth) = 0.0f;
            id(heizbetrieb_aktiv) = false;
            id(booster_status).publish_state("OFF | invalid sensor state");
            return;
          }
          
          float Tr = id(raum_temp).state;
          float Ts = id(steuerung_temp).state;
          float Trad = id(heizung_temp).state;
          if (isnan(Tr) || isnan(Ts) || isnan(Trad)) {
            // Fail-safe: NaN-Werte sicher behandeln
            if (id(last_speed) > 0) id(heizung_luefter).turn_off().perform();
            id(last_speed) = 0;
            id(target_smooth) = 0.0f;
            id(heizbetrieb_aktiv) = false;
            id(booster_status).publish_state("OFF | NaN sensor value");
            return;
          }

          float e = Ts - Tr;
          float radiator_delta = Trad - Tr;

          uint32_t now = millis();
          // Der auto_curve_offset wirkt auch auf die On/Off-Schwellen:
          // positiv = früher ein / später aus, negativ = später ein / früher aus.
          float control_bias = std::clamp(id(auto_curve_offset).state / 25.0f, -0.8f, 0.8f);
          float on_rad_threshold = std::clamp(3.0f - (control_bias * 1.0f), 1.8f, 4.2f);
          float off_rad_threshold = std::clamp(1.8f - (control_bias * 0.8f), 0.8f, 3.0f);
          if (off_rad_threshold >= on_rad_threshold) off_rad_threshold = on_rad_threshold - 0.3f;
          float on_e_threshold = std::clamp(0.2f - (control_bias * 0.5f), -0.4f, 0.6f);
          float off_e_threshold = std::clamp(-0.1f - (control_bias * 0.4f), -0.8f, 0.3f);

          bool heat_on_condition = (radiator_delta >= on_rad_threshold) && (e >= on_e_threshold);
          bool heat_off_condition = (radiator_delta < off_rad_threshold) || (e <= off_e_threshold);

          if (heat_on_condition) {
            id(heizbetrieb_aktiv) = true;
          } else if (heat_off_condition) {
            id(heizbetrieb_aktiv) = false;
          }

          bool heat_available = id(heizbetrieb_aktiv);
          if (heat_available) id(last_heat_ms) = now;

          bool recently_heating = (id(last_heat_ms) > 0) && ((now - id(last_heat_ms)) < (10u * 60u * 1000u));
          bool after_run = (!heat_available && recently_heating && radiator_delta >= 1.0f && e > -0.4f);
          
          float slope = id(room_temp_slope);
          if (id(last_room_temp_ms) > 0 && now > id(last_room_temp_ms)) {
            float dt_min = (now - id(last_room_temp_ms)) / 60000.0f;
            if (dt_min >= 0.1f && !isnan(id(last_room_temp))) {
              float raw_slope = (Tr - id(last_room_temp)) / dt_min;
              slope = std::clamp(raw_slope, -1.0f, 1.0f);
              id(room_temp_slope) = slope;
            }
          }
          id(last_room_temp) = Tr;
          id(last_room_temp_ms) = now;

          float target_speed = 0.0f;
          if (heat_available) {
            float base_speed = 20.0f;
            if (radiator_delta >= 8.0f) base_speed = 65.0f;
            else if (radiator_delta >= 5.0f) base_speed = 50.0f;
            else if (radiator_delta >= 3.0f) base_speed = 35.0f;

            if (e >= 1.5f) base_speed += 15.0f;
            else if (e >= 0.8f) base_speed += 10.0f;
            else if (e >= 0.2f) base_speed += 5.0f;

            if (slope > 0.03f) base_speed -= 8.0f;

            target_speed = std::clamp(base_speed, 20.0f, 75.0f);
          } else if (after_run) {
            target_speed = (radiator_delta >= 2.5f) ? 30.0f : 20.0f;
          }

          if (target_speed > 0.0f) {
            target_speed += id(auto_curve_offset).state;
            target_speed = std::clamp(target_speed, 0.0f, 100.0f);
          }

          float speed_limit = (float)id(auto_speed_limit).state;
          target_speed = std::min(target_speed, speed_limit);
          id(target_smooth) = (id(target_smooth) * 0.65f) + (target_speed * 0.35f);

          int speed = 0;
          if (!heat_available && !after_run) {
            speed = 0;
          } else {
            float current = (float)id(last_speed);
            float limited = std::clamp(id(target_smooth), current - 8.0f, current + 8.0f);
            speed = (int)roundf(limited);
            if (speed < 20) speed = 20;
          }
          
          bool speed_changed = (speed != id(last_speed));
          if (speed <= 0) {
            if (id(last_speed) > 0) id(heizung_luefter).turn_off().perform();
          } else if (speed_changed) {
            id(heizung_luefter).turn_on().set_speed(speed).perform();
          }
          id(last_speed) = speed;
          const char *state = heat_available ? "ACTIVE" : (after_run ? "AFTER_RUN" : "OFF");
          float curve_offset = id(auto_curve_offset).state;
          char status[200];
          snprintf(status, sizeof(status), "%s | Fan=%d%% | dRad=%.1fK | e=%.1fK | slope=%.3f | target=%.0f | off=%.0f",
            state, speed, radiator_delta, e, slope, target_speed, curve_offset);
          id(booster_status).publish_state(status);

          ESP_LOGD("booster", "state=%s rad_d=%.2f e=%.2f slope=%.3f target=%.1f offset=%.1f speed=%d", state, radiator_delta, e, slope, target_speed, curve_offset, speed);
